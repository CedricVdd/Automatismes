<title>@ home — Terminale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Caveat:wght@600&display=swap');

:root{
  --bg:#16242A;
  --bg-2:#1E2F35;
  --line:rgba(241,238,228,0.10);
  --chalk:#F1EEE4;
  --chalk-dim:#AEBBB8;
  --teal:#5FC3B5;
  --teal-dim:#3A8B7F;
  --amber:#E8B84B;
  --paper:#FBF8F1;
  --paper-line:#D8D2C0;
  --ink:#22344A;
  --ink-dim:#5B6B80;
  --red-margin:#C1503F;
  --success:#4C9A6B;
  --success-bg:#DCEEE1;
  --radius:14px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--chalk);font-family:'Inter',sans-serif;min-height:100vh;}
.wrap{max-width:640px;margin:0 auto;padding:0 0 4rem;}
.topbar{padding:1.4rem 1.25rem 1rem;}
.brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;}
.brand .bolt{color:var(--amber);font-size:20px;}

.hero{margin:0 1.25rem 1.25rem;background:var(--bg-2);border-radius:var(--radius);padding:1.3rem 1.4rem;position:relative;overflow:hidden;}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle, rgba(95,195,181,0.12), transparent 70%);}
.hero .date{font-family:'Caveat',cursive;font-size:22px;color:var(--teal);margin:0 0 6px;}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:600;margin:0 0 12px;line-height:1.3;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{font-size:12px;padding:4px 11px;border-radius:20px;background:rgba(95,195,181,0.14);color:var(--teal);border:1px solid rgba(95,195,181,0.25);font-weight:500;}

.section{margin:0 1.25rem 1.25rem;}
.label{font-size:12.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--chalk-dim);margin:0 0 8px;font-weight:600;}

.paper-card{
  background-image:linear-gradient(var(--paper-line) 1px, transparent 1px),linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
  background-size:22px 22px;background-color:var(--paper);border-radius:10px;padding:1.4rem 1.4rem 1.4rem 2.2rem;
  position:relative;color:var(--ink);box-shadow:0 6px 18px rgba(0,0,0,0.25);
}
.paper-card::before{content:"";position:absolute;left:1.5rem;top:0;bottom:0;width:1.5px;background:var(--red-margin);opacity:0.55;}
.paper-card .type-badge{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-dim);margin-bottom:8px;}
.paper-card .enonce{font-size:16.5px;line-height:1.55;font-weight:500;}

.photo-zone{border:1.5px dashed var(--line);border-radius:12px;padding:1.4rem;text-align:center;cursor:pointer;transition:border-color .15s ease;}
.photo-zone:hover{border-color:var(--teal-dim);}
.photo-zone .icon{font-size:26px;color:var(--teal);margin-bottom:6px;}
.photo-zone p{margin:0;font-size:13.5px;color:var(--chalk-dim);}
.thumb{width:100%;border-radius:10px;margin-top:12px;max-height:280px;object-fit:contain;background:#0e1a1e;}

.btn{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;padding:11px 18px;border-radius:9px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s ease, opacity .15s ease;width:100%;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--teal);color:#0C2621;}
.btn-primary:hover{background:#6FD0C2;}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}

.correction-card{background:var(--success-bg);border-left:4px solid var(--success);border-radius:12px;padding:1.1rem 1.2rem;margin-top:1rem;color:#1E4A31;}
.correction-card .cc-label{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14.5px;margin-bottom:6px;}
.correction-card p{margin:0;font-size:14.5px;line-height:1.55;}

.hidden{display:none !important;}

.progress-row{display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.progress-dots{display:flex;gap:6px;}
.progress-dot{width:9px;height:9px;border-radius:50%;background:var(--line);}
.progress-dot.done{background:var(--teal);}
.progress-dot.current{background:var(--amber);}

.done-card{background:var(--bg-2);border-radius:12px;padding:1.6rem 1.4rem;text-align:center;}
.done-card .big{font-size:30px;margin-bottom:8px;}
.done-card p{margin:0;color:var(--chalk-dim);font-size:14.5px;}

.mode-toggle{display:flex;gap:8px;margin-bottom:12px;}
.mode-toggle-btn{
  flex:1;background:var(--bg-2);border:1.5px solid var(--line);color:var(--chalk-dim);
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;
  padding:9px 8px;border-radius:9px;cursor:pointer;transition:all .15s ease;
}
.mode-toggle-btn.active{background:var(--teal);color:#0C2621;border-color:var(--teal);}
textarea#textAnswer{
  background:var(--bg-2);border:1px solid var(--line);color:var(--chalk);
  border-radius:9px;padding:12px;font-size:14.5px;font-family:'Inter',sans-serif;
  width:100%;min-height:90px;resize:vertical;
}
textarea#textAnswer:focus{outline:none;border-color:var(--teal-dim);}
.auto-feedback{border-radius:12px;padding:1.1rem 1.2rem;margin-top:1rem;border-left:4px solid;}
.auto-feedback.correct{background:var(--success-bg);border-color:var(--success);color:#1E4A31;}
.auto-feedback.incorrect{background:#F6DEDA;border-color:#B7473A;color:#4A1D16;}
.auto-feedback .af-status{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14.5px;margin-bottom:4px;}
.auto-feedback .af-note{font-size:12.5px;opacity:0.8;margin:6px 0 0;}
.your-answer{font-size:13.5px;color:var(--chalk-dim);margin:0 0 8px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><span class="bolt">&#9889;</span> ATOME [@ home] <br />(Automatismes, Travail quOtidien, Mathématiques En sciences physiques)</div>
  </div>

  <div class="hero">
    <p class="date" id="dateLabel"></p>
    <h1 id="heroTitle">C'est parti !</h1>
    <div class="chips" id="heroChips"></div>
  </div>

  <div class="section hidden" id="quizArea">
    <div class="progress-row">
      <div class="progress-dots" id="progressDots"></div>
    </div>

    <div class="section" style="margin:0 0 1.25rem;">
      <p class="label">La question</p>
      <div class="paper-card" id="questionCard"></div>
    </div>

    <div class="section" style="margin:0 0 1.25rem;">
      <p class="label">Ta réponse</p>
      <div class="mode-toggle">
        <button class="mode-toggle-btn active" id="modePhotoBtn" data-mode="photo">&#128247; Photo</button>
        <button class="mode-toggle-btn" id="modeClavierBtn" data-mode="clavier">&#9000; Clavier</button>
      </div>

      <div id="photoInputArea">
        <div class="photo-zone" id="photoZone">
          <div class="icon">&#128247;</div>
          <p>Prends en photo ta réponse manuscrite</p>
          <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none">
        </div>
        <img id="thumb" class="thumb hidden">
      </div>

      <div id="textInputArea" class="hidden">
        <textarea id="textAnswer" placeholder="Écris ta réponse ici..."></textarea>
      </div>

      <button class="btn btn-primary" id="revealBtn" style="margin-top:14px;" disabled>Voir la correction</button>
    </div>

    <div class="section hidden" style="margin:0;" id="correctionSection"></div>
  </div>

  <div class="section hidden" id="doneArea">
    <div class="done-card">
      <div class="big">&#127881;</div>
      <p>Bravo, tu as terminé les questions du jour !</p>
    </div>
  </div>

</div>

<script>
/*
  BANQUE DE QUESTIONS — Terminale

// Générateur pseudo-aléatoire déterministe (mêmes nombres pour tout le monde le même jour).
function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function randInt(rand, min, max){ return min + Math.floor(rand() * (max - min + 1)); }
function randStep(rand, min, max, step){
  const n = Math.floor((max - min) / step) + 1;
  return min + step * Math.floor(rand() * n);
}
function fmt(num, decimals){
  let s = num.toFixed(decimals);
  if(s.indexOf('.') !== -1){
    s = s.replace(/0+$/, '').replace(/\.$/, '');
  }
  return s.replace('.', ',');
}

// Regroupe les questions par thème puis les ré-intercale (thème A, B, C, A, B, C...)
// pour éviter que 5 questions consécutives viennent toutes du même chapitre.
function interleaveByTheme(pool){
  const groups = {};
  const order = [];
  pool.forEach(q => {
    if(!groups[q.theme]){ groups[q.theme] = []; order.push(q.theme); }
    groups[q.theme].push(q);
  });
  const result = [];
  let idx = 0;
  let added = true;
  while(added){
    added = false;
    for(const key of order){
      if(groups[key][idx]){
        result.push(groups[key][idx]);
        added = true;
      }
    }
    idx++;
  }
  return result;
}

// Choisit un bloc de 5 questions différent chaque jour, sans chevauchement
// d'un jour à l'autre. Les questions à calcul sont régénérées avec des
// nombres nouveaux chaque jour, donc elles ne se répètent jamais vraiment,
// même si le même "modèle" revient après plusieurs semaines.
function getTodayQuestions(){
  const epoch = new Date(2026, 0, 1);
  const now = new Date();
  const days = Math.floor((now - epoch) / 86400000);

  const templated = TEMPLATES.map((tpl, i) => tpl.build(mulberry32(days * 1000 + i + 1)));
  const combinedPool = QUESTIONS.concat(templated);

  const pool = interleaveByTheme(combinedPool);
  if(pool.length === 0) return [];
  const numBlocks = Math.max(1, Math.ceil(pool.length / MAX_PER_DAY));
  const block = ((days % numBlocks) + numBlocks) % numBlocks;
  const start = block * MAX_PER_DAY;
  const count = Math.min(MAX_PER_DAY, pool.length);
  const result = [];
  for(let i = 0; i < count; i++){
    result.push(pool[(start + i) % pool.length]);
  }
  return result;
}

  quizArea.classList.remove('hidden');
  heroTitle.textContent = "C'est parti !";
  heroChips.innerHTML = `<span class="chip">Terminale</span><span class="chip">${todayQuestions.length} question${todayQuestions.length>1?'s':''} aujourd'hui</span>`;
  renderProgressDots();
  renderQuestion();
}

function renderProgressDots(){
  const dots = document.getElementById('progressDots');
  dots.innerHTML = todayQuestions.map((_, i) => {
    let cls = 'progress-dot';
    if(i < currentIndex) cls += ' done';
    else if(i === currentIndex) cls += ' current';
    return `<span class="${cls}"></span>`;
  }).join('');
}

const photoZone = document.getElementById('photoZone');
const photoInput = document.getElementById('photoInput');
const thumb = document.getElementById('thumb');
const revealBtn = document.getElementById('revealBtn');
const photoInputArea = document.getElementById('photoInputArea');
const textInputArea = document.getElementById('textInputArea');
const modePhotoBtn = document.getElementById('modePhotoBtn');
const modeClavierBtn = document.getElementById('modeClavierBtn');
const textAnswer = document.getElementById('textAnswer');
let answerMode = 'photo';

modePhotoBtn.addEventListener('click', () => setAnswerMode('photo'));
modeClavierBtn.addEventListener('click', () => setAnswerMode('clavier'));

function setAnswerMode(mode){
  answerMode = mode;
  modePhotoBtn.classList.toggle('active', mode === 'photo');
  modeClavierBtn.classList.toggle('active', mode === 'clavier');
  photoInputArea.classList.toggle('hidden', mode !== 'photo');
  textInputArea.classList.toggle('hidden', mode !== 'clavier');
  updateRevealState();
}

function updateRevealState(){
  if(answerMode === 'photo'){
    revealBtn.disabled = !(thumb.src && !thumb.classList.contains('hidden'));
  }else{
    revealBtn.disabled = textAnswer.value.trim().length === 0;
  }
}
textAnswer.addEventListener('input', updateRevealState);

function parseNumberFromText(text){
  if(!text) return null;
  const fracMatch = text.match(/(-?\d+)\s*\/\s*(\d+)/);
  if(fracMatch){
    const den = parseFloat(fracMatch[2]);
    if(den !== 0) return parseFloat(fracMatch[1]) / den;
  }
  const decMatch = text.match(/-?\d+(?:[.,]\d+)?/);
  if(decMatch) return parseFloat(decMatch[0].replace(',', '.'));
  return null;
}

function extractExpectedNumber(reponseText){
  const lastEq = reponseText.lastIndexOf('=');
  const snippet = lastEq >= 0 ? reponseText.slice(lastEq + 1) : reponseText;
  return parseNumberFromText(snippet);
}

function isClose(a, b){
  const tol = Math.max(0.01, Math.abs(b) * 0.02);
  return Math.abs(a - b) <= tol;
}

function renderQuestion(){
  const q = todayQuestions[currentIndex];
  document.getElementById('questionCard').innerHTML = `<span class="type-badge">${typeLabels[q.type]||q.type} · Question ${currentIndex+1}/${todayQuestions.length}</span><p class="enonce">${q.enonce}</p>`;
  thumb.classList.add('hidden');
  thumb.src = '';
  photoInput.value = '';
  textAnswer.value = '';
  revealBtn.disabled = true;
  revealBtn.textContent = 'Voir la correction';
  document.getElementById('correctionSection').classList.add('hidden');
  document.getElementById('correctionSection').innerHTML = '';
  renderProgressDots();
}

photoZone.addEventListener('click', () => photoInput.click());
photoInput.addEventListener('change', () => {
  if(photoInput.files && photoInput.files[0]){
    thumb.src = URL.createObjectURL(photoInput.files[0]);
    thumb.classList.remove('hidden');
    updateRevealState();
  }
});

revealBtn.addEventListener('click', () => {
  const q = todayQuestions[currentIndex];
  const isLast = currentIndex === todayQuestions.length - 1;
  let blockHtml = '';

  if(answerMode === 'clavier' && q.type === 'calcul'){
    const expected = extractExpectedNumber(q.reponse);
    const studentVal = parseNumberFromText(textAnswer.value);
    if(expected !== null && studentVal !== null){
      const correct = isClose(studentVal, expected);
      blockHtml = `
        <p class="your-answer">Ta réponse : « ${textAnswer.value.trim()} »</p>
        <div class="auto-feedback ${correct ? 'correct' : 'incorrect'}">
          <p class="af-status">${correct ? '&#10003; Correct' : '&#10005; À revoir'}</p>
          <p>${q.reponse}</p>
          <p class="af-note">Vérification automatique sur la valeur numérique — relis le corrigé complet ci-dessus pour t'assurer d'avoir bien tout justifié.</p>
        </div>`;
    }else{
      blockHtml = `
        <p class="your-answer">Ta réponse : « ${textAnswer.value.trim()} »</p>
        <div class="correction-card"><p class="cc-label">Compare avec ta réponse</p><p>${q.reponse}</p></div>`;
    }
  }else if(answerMode === 'clavier'){
    blockHtml = `
      <p class="your-answer">Ta réponse : « ${textAnswer.value.trim()} »</p>
      <div class="correction-card"><p class="cc-label">Compare avec ta réponse</p><p>${q.reponse}</p></div>`;
  }else{
    blockHtml = `<div class="correction-card"><p class="cc-label">Compare avec ta réponse</p><p>${q.reponse}</p></div>`;
  }

  document.getElementById('correctionSection').innerHTML = `
    <p class="label">Corrigé</p>
    ${blockHtml}
    <button class="btn btn-primary" id="nextBtn" style="margin-top:12px;">${isLast ? 'Terminer' : 'Question suivante'}</button>
  `;
  document.getElementById('correctionSection').classList.remove('hidden');
  revealBtn.disabled = true;
  revealBtn.classList.add('hidden');

  document.getElementById('nextBtn').addEventListener('click', () => {
    revealBtn.classList.remove('hidden');
    if(isLast){
      currentIndex++;
      renderProgressDots();
      quizArea.classList.add('hidden');
      doneArea.classList.remove('hidden');
      heroTitle.textContent = 'Terminé pour aujourd\'hui';
    }else{
      currentIndex++;
      renderQuestion();
    }
  });
});

start();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
